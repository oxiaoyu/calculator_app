name: Build Calculator APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code analysis
        run: flutter analyze

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: calculator-app-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Build release APK
        run: flutter build apk --release
        if: startsWith(github.ref, 'refs/tags/v')

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          name: calculator-app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload to Pgyer (蒲公英)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          api_key="${{ secrets.PGYER_API_KEY }}"
          tag_name="${GITHUB_REF#refs/tags/}"
          
          echo "Step 1: Get COSToken"
          token_response=$(curl -s -X POST "https://api.pgyer.com/apiv2/app/getCOSToken" \
            -d "_api_key=${api_key}" \
            -d "buildType=android" \
            -d "buildInstallType=1" \
            -d "buildName=calculator-app" \
            -d "buildVersion=${tag_name}" \
            -d "buildUpdateDescription=GitHub Actions自动上传")
          echo "$token_response"
          
          cos_key=$(echo $token_response | grep -o '"key":"[^"]*' | sed 's/"key":"//')
          cos_endpoint=$(echo $token_response | grep -o '"endpoint":"[^"]*' | sed 's/"endpoint":"//')
          cos_signature=$(echo $token_response | grep -o '"signature":"[^"]*' | sed 's/"signature":"//')
          cos_token=$(echo $token_response | grep -o '"x-cos-security-token":"[^"]*' | sed 's/"x-cos-security-token":"//')
          
          echo "Step 2: Upload to COS"
          upload_result=$(curl -s -X POST "${cos_endpoint}" \
            -F "key=${cos_key}" \
            -F "signature=${cos_signature}" \
            -F "x-cos-security-token=${cos_token}" \
            -F "x-cos-meta-file-name=app-release.apk" \
            -F "file=@build/app/outputs/flutter-apk/app-release.apk" \
            -w "\\n%{http_code}")
          echo "$upload_result"
          
          echo "Step 3: Wait and check status (30 seconds)..."
          sleep 30
          
          status_resp=$(curl -s "https://api.pgyer.com/apiv2/app/buildInfo?_api_key=${api_key}&buildKey=${cos_key}")
          echo "$status_resp"
          
          # 检查返回码
          result_code=$(echo "$status_resp" | grep -o '"code":[0-9]*' | head -1 | sed 's/"code":////')
          
          if echo "$status_resp" | grep -q '"buildKey"'; then
            app_key=$(echo "$status_resp" | grep -o '"buildKey":"[^"]*' | sed 's/"buildKey":"//' | sed 's/"$//')
            echo ""
            echo "========================================"
            echo "✅ 上传成功!"
            echo "========================================"
            echo "安装地址: https://www.pgyer.com/install/$app_key"
            echo "二维码: https://www.pgyer.com/install/$app_key#apk"
            echo "========================================"
          else
            echo ""
            echo "请访问 https://www.pgyer.com 查看上传结果"
          fi

name: Build Calculator APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter build apk --debug

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: build/app/outputs/flutter-apk/app-debug.apk

      - run: flutter build apk --release
        if: startsWith(github.ref, 'refs/tags/v')

      - uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload to Pgyer (直接API)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          API_KEY="${{ secrets.PGYER_API_KEY }}"
          VERSION="${{ github.ref_name }}"
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          
          echo "使用直接上传API..."
          
          # 使用旧的直接上传API (不需要COS)
          RESPONSE=$(curl -s -X POST "https://www.pgyer.com/apiv2/app/upload" \
            -F "_api_key=$API_KEY" \
            -F "buildType=android" \
            -F "buildInstallType=1" \
            -F "buildName=calculator-app" \
            -F "buildVersion=$VERSION" \
            -F "buildUpdateDescription=GitHubActions-AutoUpload" \
            -F "file=@$APK_PATH")
          
          echo "响应: $RESPONSE"
          
          # 解析结果
          CODE=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('code',-1))")
          MSG=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('message',''))")
          
          if [ "$CODE" = "0" ]; then
            BUILD_KEY=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('buildKey',''))")
            echo "================================"
            echo "✅ 上传成功!"
            echo "安装: https://www.pgyer.com/install/$BUILD_KEY"
            echo "================================"
          else
            echo "❌ 上传失败: $MSG (code: $CODE)"
          fi

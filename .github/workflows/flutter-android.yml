name: Build Calculator APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code analysis
        run: flutter analyze

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: calculator-app-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Build release APK
        run: flutter build apk --release
        if: startsWith(github.ref, 'refs/tags/v')

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          name: calculator-app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload to Pgyer (蒲公英) - Step 1: Get Token
        if: startsWith(github.ref, 'refs/tags/v')
        id: step1
        run: |
          echo "Step 1: 获取上传token..."
          token_response=$(curl -s -X POST "https://api.pgyer.com/apiv2/app/getCOSToken" \
            -d "_api_key=${{ secrets.PGYER_API_KEY }}" \
            -d "buildType=android" \
            -d "buildInstallType=1" \
            -d "buildName=calculator-app" \
            -d "buildVersion=${{ github.ref_name }}" \
            -d "buildUpdateDescription=Auto upload via GitHub Actions")
          echo "Token响应: $token_response"
          
          # 提取token参数
          cos_key=$(echo $token_response | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('key',''))" 2>/dev/null)
          cos_endpoint=$(echo $token_response | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('endpoint',''))" 2>/dev/null)
          cos_signature=$(echo $token_response | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('params',{}).get('signature',''))" 2>/dev/null)
          cos_token=$(echo $token_response | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('params',{}).get('x-cos-security-token',''))" 2>/dev/null)
          
          echo "cos_key=$cos_key" >> $GITHUB_OUTPUT
          echo "cos_endpoint=$cos_endpoint" >> $GITHUB_OUTPUT
          echo "cos_signature=$cos_signature" >> $GITHUB_OUTPUT
          echo "cos_token=$cos_token" >> $GITHUB_OUTPUT

      - name: Upload to Pgyer (蒲公英) - Step 2: Upload File
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cos_key="${{ steps.step1.outputs.cos_key }}"
          cos_endpoint="${{ steps.step1.outputs.cos_endpoint }}"
          cos_signature="${{ steps.step1.outputs.cos_signature }}"
          cos_token="${{ steps.step1.outputs.cos_token }}"
          
          echo "Step 2: 上传文件..."
          upload_response=$(curl -s -X POST "$cos_endpoint" \
            -F "key=$cos_key" \
            -F "signature=$cos_signature" \
            -F "x-cos-security-token=$cos_token" \
            -F "x-cos-meta-file-name=app-release.apk" \
            -F "file=@build/app/outputs/flutter-apk/app-release.apk")
          echo "上传响应: $upload_response"
          echo "HTTP状态码: $upload_response"

      - name: Upload to Pgyer (蒲公英) - Step 3: Check Status
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cos_key="${{ steps.step1.outputs.cos_key }}"
          
          echo "Step 3: 检查发布状态..."
          # 等待一下让后台处理
          sleep 10
          
          status_response=$(curl -s "https://api.pgyer.com/apiv2/app/buildInfo?_api_key=${{ secrets.PGYER_API_KEY }}&buildKey=$cos_key")
          echo "状态响应: $status_response"
          
          build_key=$(echo $status_response | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('buildKey',''))" 2>/dev/null)
          build_qrcode=$(echo $status_response | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('buildQRCodeURL',''))" 2>/dev/null)
          
          if [ -n "$build_key" ]; then
            echo ""
            echo "✅ 发布成功！"
            echo "✅ Build Key: $build_key"
            echo "✅ 安装地址: https://www.pgyer.com/install/$build_key"
            echo "✅ 二维码: https://www.pgyer.com/install/$build_key#apk"
          fi

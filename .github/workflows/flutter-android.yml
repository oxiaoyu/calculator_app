name: Build Calculator APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code analysis
        run: flutter analyze

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: calculator-app-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Build release APK
        run: flutter build apk --release
        if: startsWith(github.ref, 'refs/tags/v')

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          name: calculator-app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload to Pgyer (蒲公英)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          api_key="${{ secrets.PGYER_API_KEY }}"
          tag_name="${GITHUB_REF#refs/tags/}"
          
          echo "Step 1: 获取上传token..."
          token_response=$(curl -s -X POST "https://api.pgyer.com/apiv2/app/getCOSToken" \
            -d "_api_key=${api_key}" \
            -d "buildType=android" \
            -d "buildInstallType=1" \
            -d "buildName=calculator-app" \
            -d "buildVersion=${tag_name}" \
            -d "buildUpdateDescription=Auto upload via GitHub Actions")
          echo "Token响应: $token_response"
          
          # 提取token参数
          cos_key=$(echo $token_response | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('key',''))")
          cos_endpoint=$(echo $token_response | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('endpoint',''))")
          cos_signature=$(echo $token_response | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('params',{}).get('signature',''))")
          cos_token=$(echo $token_response | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('params',{}).get('x-cos-security-token',''))")
          
          echo "Step 2: 上传文件..."
          upload_response=$(curl -s -X POST "${cos_endpoint}" \
            -F "key=${cos_key}" \
            -F "signature=${cos_signature}" \
            -F "x-cos-security-token=${cos_token}" \
            -F "x-cos-meta-file-name=app-release.apk" \
            -F "file=@build/app/outputs/flutter-apk/app-release.apk")
          echo "上传响应: $upload_response"
          
          echo "Step 3: 检查发布状态 (等待10秒)..."
          sleep 10
          
          status_response=$(curl -s "https://api.pgyer.com/apiv2/app/buildInfo?_api_key=${api_key}&buildKey=${cos_key}")
          echo "状态响应: $status_response"
          
          build_key_result=$(echo $status_response | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('buildKey',''))")
          
          if [ -n "$build_key_result" ]; then
            echo ""
            echo "========================================"
            echo "✅ 蒲公英上传成功！"
            echo "========================================"
            echo "✅ Build Key: $build_key_result"
            echo "✅ 安装地址: https://www.pgyer.com/install/$build_key_result"
            echo "✅ 二维码地址: https://www.pgyer.com/install/$build_key_result#apk"
            echo "========================================"
          fi

name: Build Calculator APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - run: flutter pub get

      - run: flutter analyze

      - run: flutter build apk --debug

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: build/app/outputs/flutter-apk/app-debug.apk

      - run: flutter build apk --release
        if: startsWith(github.ref, 'refs/tags/v')

      - uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload to Pgyer
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          API_KEY="${{ secrets.PGYER_API_KEY }}"
          VERSION="${{ github.ref_name }}"
          
          # Step 1 - Get token
          echo "Getting token..."
          TOKEN=$(curl -s -X POST "https://api.pgyer.com/apiv2/app/getCOSToken" \
            --data-urlencode "_api_key=$API_KEY" \
            --data-urlencode "buildType=android" \
            --data-urlencode "buildInstallType=1" \
            --data-urlencode "buildName=calculator-app" \
            --data-urlencode "buildVersion=$VERSION" \
            --data-urlencode "buildUpdateDescription=Auto")
          
          echo "$TOKEN"
          
          # Extract JSON data
          KEY=$(echo "$TOKEN" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('key',''))")
          ENDPOINT=$(echo "$TOKEN" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('endpoint',''))")
          SIG=$(echo "$TOKEN" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('params',{}).get('signature',''))")
          TOK=$(echo "$TOKEN" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('params',{}).get('x-cos-security-token',''))")
          
          echo "Key: $KEY"
          
          # Step 2 - Upload immediately
          echo "Uploading..."
          curl -s -X POST "$ENDPOINT" \
            -F "key=$KEY" \
            -F "signature=$SIG" \
            -F "x-cos-security-token=$TOK" \
            -F "file=@build/app/outputs/flutter-apk/app-release.apk" \
            -w "\\n%{http_code}" || echo "204"
          
          echo "Waiting 25s..."
          sleep 25
          
          # Step 3 - Check status
          echo "Checking status..."
          STATUS=$(curl -s "https://api.pgyer.com/apiv2/app/buildInfo?_api_key=$API_KEY&buildKey=$KEY")
          echo "$STATUS"
          
          BUILD_KEY=$(echo "$STATUS" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('buildKey',''))")
          if [ -n "$BUILD_KEY" ]; then
            echo "================================"
            echo "SUCCESS! https://www.pgyer.com/install/$BUILD_KEY"
            echo "================================"
          else
            echo "Check pgyer.com manually"
          fi

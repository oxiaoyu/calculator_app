name: Build Calculator APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code analysis
        run: flutter analyze

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: calculator-app-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Build release APK
        run: flutter build apk --release
        if: startsWith(github.ref, 'refs/tags/v')

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          name: calculator-app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload to Pgyer
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          API_KEY="${{ secrets.PGYER_API_KEY }}"
          VERSION="${{ github.ref_name }}"
          
          # Get token
          TOKEN_RESP=$(curl -s -X POST "https://api.pgyer.com/apiv2/app/getCOSToken" \
            -F "_api_key=$API_KEY" \
            -F "buildType=android" \
            -F "buildInstallType=1" \
            -F "buildName=calculator-app" \
            -F "buildVersion=$VERSION" \
            -F "buildUpdateDescription=GitHubActions")
          
          echo "Token response: $TOKEN_RESP"
          
          # Extract values using python in subprocess
          python3 -c "
import json,sys,subprocess
token = '''$TOKEN_RESP'''
d = json.loads(token)
data = d.get('data',{})
params = data.get('params',{})
print('KEY='+data.get('key',''))
print('ENDPOINT='+data.get('endpoint',''))
print('SIG='+params.get('signature',''))
print('TOK='+params.get('x-cos-security-token',''))
" > /tmp/pgyer.env
          
          source /tmp/pgyer.env
          echo "Uploading to $ENDPOINT with key $KEY..."
          
          # Upload immediately
          curl -s -X POST "$ENDPOINT" \
            -F "key=$KEY" \
            -F "signature=$SIG" \
            -F "x-cos-security-token=$TOK" \
            -F "x-cos-meta-file-name=app-release.apk" \
            -F "file=@build/app/outputs/flutter-apk/app-release.apk"
          echo "Upload done, waiting 25s..."
          sleep 25
          
          # Check status
          STATUS=$(curl -s "https://api.pgyer.com/apiv2/app/buildInfo?_api_key=$API_KEY&buildKey=$KEY")
          echo "Status: $STATUS"
          
          # Extract result
          BUILD_KEY=$(echo "$STATUS" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('data',{}).get('buildKey',''))")
          if [ -n "$BUILD_KEY" ]; then
            echo "====================================="
            echo "✅ SUCCESS! Install: https://www.pgyer.com/install/$BUILD_KEY"
            echo "====================================="
          fi

name: Build Calculator APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code analysis
        run: flutter analyze

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: calculator-app-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Build release APK
        run: flutter build apk --release
        if: startsWith(github.ref, 'refs/tags/v')

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          name: calculator-app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload to Pgyer (蒲公英)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          # 调试：打印使用的 API key
          echo "API Key: ${{ secrets.PGYER_API_KEY }}"
          echo ""
          
          # 使用 form URL encoded 方式
          response=$(curl -s \
            -X POST "https://www.pgyer.com/apiv2/app/upload" \
            -H "enctype: multipart/form-data" \
            -F "_api_key=${{ secrets.PGYER_API_KEY }}" \
            -F "buildType=android" \
            -F "buildInstallType=2" \
            -F "buildPassword=123456" \
            -F "buildName=calculator-app" \
            -F "buildVersion=${{ github.ref_name }}" \
            -F "buildUpdateDescription=Auto upload via GitHub Actions" \
            -F "file=@build/app/outputs/flutter-apk/app-release.apk")
          echo "蒲公英响应: $response"
          
          build_key=$(echo $response | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('buildKey',''))" 2>/dev/null)
          if [ -n "$build_key" ]; then
            echo ""
            echo "✅ 安装地址: https://www.pgyer.com/install/$build_key"
            echo "✅ 二维码地址: https://www.pgyer.com/install/$build_key#apk"
          fi
